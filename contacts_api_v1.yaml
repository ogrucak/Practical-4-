openapi: 3.0.3
info:
  title: Mini-CRM Contacts API
  version: 1.0.0
  description: API для зберігання та пошуку контактів

servers:
  - url: https://api.minicrm.local/v1

paths:

  /contacts:
    get:
      summary: Отримати список контактів
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            example: 1
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            example: 10
      responses:
        "200":
          description: Успішне отримання списку контактів
          content:
            application/json:
              example:
                data:
                  - id: "1"
                    fullName: "Ivan Petrenko"
                    phone: "+380501112233"
                    email: "ivan@example.com"
                    tags: ["client"]
                    createdAt: "2026-05-01T10:00:00Z"
                meta:
                  page: 1
                  limit: 10

        "401":
          description: Неавторизовано
        "500":
          description: Помилка сервера

    post:
      summary: Створити контакт
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContactInput'
            example:
              fullName: "Anna Shevchenko"
              phone: "+380671234567"
              email: "anna@example.com"
              tags: ["lead"]
      responses:
        "201":
          description: Контакт створено
          content:
            application/json:
              example:
                id: "2"
                fullName: "Anna Shevchenko"
                phone: "+380671234567"
                email: "anna@example.com"
                tags: ["lead"]
                createdAt: "2026-05-03T12:00:00Z"

        "400":
          description: Помилка валідації (приклад mock)
          content:
            application/json:
              example:
                error: "Validation error"
                details:
                  email: "Invalid email format"

        "401":
          description: Неавторизовано

  /contacts/{contactId}:
    get:
      summary: Отримати контакт за ID
      parameters:
        - name: contactId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Контакт знайдено (mock приклад)
          content:
            application/json:
              example:
                id: "1"
                fullName: "Ivan Petrenko"
                phone: "+380501112233"
                email: "ivan@example.com"
                tags: ["client"]
                createdAt: "2026-05-01T10:00:00Z"

        "404":
          description: Контакт не знайдено
          content:
            application/json:
              example:
                error: "Contact not found"

    put:
      summary: Повністю оновити контакт
      parameters:
        - name: contactId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContactInput'
      responses:
        "200":
          description: Контакт оновлено
        "404":
          description: Не знайдено

    patch:
      summary: Частково оновити контакт
      parameters:
        - name: contactId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Контакт частково оновлено
        "400":
          description: Некоректні дані
        "404":
          description: Не знайдено

    delete:
      summary: Видалити контакт
      parameters:
        - name: contactId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Контакт видалено
        "404":
          description: Не знайдено

  /contacts/search:
    get:
      summary: Пошук контактів
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
            example: "Ivan"
      responses:
        "200":
          description: Результати пошуку
          content:
            application/json:
              example:
                data:
                  - id: "1"
                    fullName: "Ivan Petrenko"
                    phone: "+380501112233"
                    email: "ivan@example.com"
                    tags: ["client"]

        "400":
          description: q обов’язковий параметр

        "401":
          description: Неавторизовано

components:
  schemas:

    Contact:
      type: object
      properties:
        id:
          type: string
        fullName:
          type: string
        phone:
          type: string
        email:
          type: string
        tags:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time

    ContactInput:
      type: object
      required:
        - fullName
        - phone
        - email
      properties:
        fullName:
          type: string
        phone:
          type: string
        email:
          type: string
        tags:
          type: array
          items:
            type: string